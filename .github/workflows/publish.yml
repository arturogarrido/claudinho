name: Publish

# Publishes @claudinho/{core,cli,mcp} to npm with provenance, then creates the
# matching GitHub Release (so the repo's "Latest release" tracks npm).
#
# Trigger: push a version tag — `git tag v0.2.0 && git push origin v0.2.0`
#          (or run manually from the Actions tab via "Run workflow").
#
# Auth: npm trusted publishing (OIDC) — NO token. The `id-token: write`
#   permission below lets npm mint a short-lived, workflow-scoped credential, so
#   there's no NPM_TOKEN secret to manage or rotate. A trusted publisher must be
#   configured on npmjs for each package (repo + workflow `publish.yml`).
#   See https://docs.npmjs.com/trusted-publishers.
#
# Prerequisites:
#   - The repository must be PUBLIC — trusted publishing and provenance both
#     require a publicly verifiable source; pnpm refuses provenance for a
#     private package.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release for the tag (the "Latest" marker)
  id-token: write # OIDC token used to sign the npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned (not tag-pinned): this job holds `id-token: write` — the npm
      # trusted-publishing credential for all three packages — so a re-pointed
      # action tag must not be able to execute here. Dependabot updates SHA pins.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org # target the public registry (OIDC supplies auth)

      - run: pnpm install --frozen-lockfile

      # Don't ship a broken release — build first (cli/mcp resolve @claudinho/core
      # from its dist), then the same gates CI runs.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm lint

      # On a tag push, refuse to publish unless the tag matches EVERY published
      # package version (the workflow publishes all three). The .mcpb manifest and
      # MCP Registry server.json are checked against mcp/package.json by vitest.
      - name: Verify tag matches all package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF_NAME#v}
          for pkg in core cli mcp; do
            PKG=$(node -p "require('./packages/$pkg/package.json').version")
            [ "$PKG" = "$TAG" ] || { echo "::error::packages/$pkg version $PKG != tag $GITHUB_REF_NAME"; exit 1; }
          done
          echo "all package versions match $TAG"

      # Publish core → cli → mcp. pnpm orders by workspace deps, rewrites
      # workspace:* to the real version, and skips versions already on npm.
      # --provenance attaches a signed build attestation (needs id-token: write).
      - name: Publish to npm with provenance
        run: pnpm -r publish --provenance --access public --no-git-checks

      # Create the GitHub Release for this tag so the repo's "Latest release"
      # tracks npm (this used to be a manual step and silently lapsed after
      # v0.5.0). Idempotent — skips if the release already exists (re-runs);
      # --generate-notes lists the merged PRs since the previous release.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — skipping"
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --latest \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
