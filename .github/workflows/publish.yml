name: Publish

# Publishes @claudinho/{core,cli,mcp} to npm with provenance.
#
# Trigger: push a version tag — `git tag v0.2.0 && git push origin v0.2.0`
#          (or run manually from the Actions tab via "Run workflow").
#
# Auth: npm trusted publishing (OIDC) — NO token. The `id-token: write`
#   permission below lets npm mint a short-lived, workflow-scoped credential, so
#   there's no NPM_TOKEN secret to manage or rotate. A trusted publisher must be
#   configured on npmjs for each package (repo + workflow `publish.yml`).
#   See https://docs.npmjs.com/trusted-publishers.
#
# Prerequisites:
#   - The repository must be PUBLIC — trusted publishing and provenance both
#     require a publicly verifiable source; pnpm refuses provenance for a
#     private package.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token used to sign the npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org # target the public registry (OIDC supplies auth)

      - run: pnpm install --frozen-lockfile

      # Don't ship a broken release — build first (cli/mcp resolve @claudinho/core
      # from its dist), then the same gates CI runs.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm lint

      # On a tag push, refuse to publish unless the tag matches EVERY published
      # package version (the workflow publishes all three). The .mcpb manifest and
      # MCP Registry server.json are checked against mcp/package.json by vitest.
      - name: Verify tag matches all package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF_NAME#v}
          for pkg in core cli mcp; do
            PKG=$(node -p "require('./packages/$pkg/package.json').version")
            [ "$PKG" = "$TAG" ] || { echo "::error::packages/$pkg version $PKG != tag $GITHUB_REF_NAME"; exit 1; }
          done
          echo "all package versions match $TAG"

      # Publish core → cli → mcp. pnpm orders by workspace deps, rewrites
      # workspace:* to the real version, and skips versions already on npm.
      # --provenance attaches a signed build attestation (needs id-token: write).
      - name: Publish to npm with provenance
        run: pnpm -r publish --provenance --access public --no-git-checks
