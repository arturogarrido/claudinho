name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build · typecheck · test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pnpm 11.5 (our pinned packageManager) requires Node >= 22.13, so the
        # toolchain runs on 22/24. The published packages still target Node >= 20
        # — that floor is verified by the `runtime-node20` job below.
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads pnpm version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build first, in topological order — cli/mcp import @claudinho/core from
      # its built dist, so typecheck/test need it present.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r --if-present lint

  runtime-node20:
    name: runtime smoke (Node 20 engines floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      # Build with a pnpm-supported Node...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # ...then run the built artifacts under Node 20 to confirm the shipped
      # code actually works on the version we advertise (engines.node >= 20).
      # Uses offline-only commands (bundled schedule, no network).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Exercise the built CLI on Node 20
        run: |
          node --version
          node packages/cli/dist/index.js next MEX
          node packages/cli/dist/index.js table A
          node packages/cli/dist/index.js vibe
          echo "Node 20 runtime OK"

  audit:
    name: audit (shipped deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gate the build only on vulnerabilities in *shipped* (production) deps —
      # dev-toolchain CVEs are caught by Dependabot but shouldn't block CI.
      - name: Audit production dependencies
        run: pnpm audit --prod

      # Surface dev-toolchain advisories for visibility, without failing.
      - name: Audit all dependencies (non-blocking)
        run: pnpm audit || true
