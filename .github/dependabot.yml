# Dependabot **version updates** (routine bump PRs).
#
# This is separate from Dependabot **security alerts**, which are enabled in the
# GitHub UI (Security tab) and already flag vulnerable deps. This file opens the
# regular update PRs that keep the toolchain current.
#
# NOTE: opening PRs also requires the repo setting Settings -> Actions -> General
# -> "Allow GitHub Actions to create and approve pull requests" to be ON. With it
# OFF, Dependabot pushes update branches but silently fails to open the PR (you
# get orphan dependabot/* branches and no PRs).
version: 2
updates:
  # npm / pnpm workspace (root lockfile covers all packages/*).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Group the noisy minor/patch bumps; majors still come as individual PRs so
    # they get a deliberate review.
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      prod-dependencies:
        dependency-type: production
        update-types: [minor, patch]
    # @types/node tracks the Node version we support (engines floor: Node 20),
    # not the newest Node major. Skip major-version PRs (e.g. 22 -> 25): a newer
    # major types APIs that may not exist on our floor. Minor/patch still flow.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Keep the GitHub Actions used in CI up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
